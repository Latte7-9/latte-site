<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - Latte</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .admin-container { display: none; }
  .admin-container.ready { display: block; }
  .repo-setup { text-align: center; padding: 4rem 2rem; max-width: 500px; margin: 0 auto; }
  .repo-setup h3 { font-size: 1.3rem; font-weight: 400; margin-bottom: 0.8rem; }
  .repo-setup .hint { font-size: 0.85rem; color: #bbb; margin-top: 0.4rem; }
  .repo-setup input { width: 100%; padding: 0.7rem 1rem; font-size: 0.9rem; border: 1px solid #e0e0e0; border-radius: 8px; font-family: inherit; margin-top: 0.5rem; }
  .step-num { display: inline-block; width: 22px; height: 22px; border-radius: 50%; background: #1a1a1a; color: #fff; font-size: 0.7rem; line-height: 22px; margin-right: 0.5rem; text-align: center; }
  .section-card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.2rem; }
  .section-card h4 { font-size: 0.98rem; font-weight: 480; color: #1a1a1a; margin-bottom: 1rem; }
  .section-card h5 { font-size: 0.85rem; font-weight: 480; color: #888; margin: 1rem 0 0.3rem; }
  .delete-btn { background: transparent; border: 1px solid #f0d0d0; color: #b71c1c; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .delete-btn:hover { background: #fef0f0; }
  .blog-editor { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
  .blog-editor h4 { font-size: 1rem; font-weight: 480; margin-bottom: 1rem; color: #1a1a1a; }
  .help-text { font-size: 0.78rem; color: #ccc; margin-top: 0.2rem; }
  .status-msg { font-size: 0.85rem; margin-left: 0.8rem; display: inline-block; }
  .status-msg.ok { color: #4caf50; }
  .status-msg.err { color: #c62828; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a class="nav-brand" href="../index.html">Latte 后台</a>
    <ul class="nav-links">
      <li><a href="../index.html">首页</a></li>
      <li><a href="../blog/">博客</a></li>
      <li><a href="index.html">管理</a></li>
    </ul>
  </div>
</nav>

<div class="repo-setup" id="setupScreen">
  <h3>连接 GitHub 仓库</h3>
  <p style="color:#999;font-size:0.9rem;margin-bottom:1.5rem;">输入仓库信息，开始在线编辑</p>
  <div style="text-align:left;">
    <p><span class="step-num">1</span> <strong>仓库路径</strong></p>
    <input type="text" id="repoInput" placeholder="Latte7-9/latte-site">
    <p class="hint">格式：用户名/仓库名</p>
    <p style="margin-top:1.2rem;"><span class="step-num">2</span> <strong>Personal Access Token</strong></p>
    <input type="password" id="tokenInput" placeholder="ghp_...">
    <p class="hint">需要 repo 权限</p>
    <button class="btn btn-primary" onclick="connectRepo()" style="width:100%;margin-top:1.5rem;">连接</button>
  </div>
</div>

<div class="admin-container" id="adminMain">
  <div class="admin-header">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
      <h2 style="margin:0;">管理面板</h2>
      <a href="https://latte7-9.github.io/latte-site/" target="_blank" style="display:inline-block;padding:0.5rem 1.2rem;background:#2471a3;color:#fff;border-radius:100px;text-decoration:none;font-size:0.85rem;font-weight:500;transition:all 0.2s;" onmouseover="this.style.background=\<div class="admin-tabs">
      <button class="active" onclick="switchTab('content')">网站内容</button>
      <button onclick="switchTab('interests')">兴趣子页面</button>
      <button onclick="switchTab('blog')">博客管理</button>
      <button onclick="switchTab('images')">图片管理</button>
      <button onclick="switchTab('netease')">随心一听</button>
      <button onclick="disconnect()" style="border-color:#e8c0c0;color:#b71c1c;">断开</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- Tab: Content -->
    <div class="admin-panel active" id="tab-content">
      <div class="admin-form">
        <label>姓名</label><input type="text" id="editName">
        <label>简介标语</label><input type="text" id="editTagline">
        <label>关于我</label><textarea id="editAbout" rows="3"></textarea>
        <label>邮箱</label><input type="text" id="editEmail">
        <label>首页书籍（书名 / 作者 / 封面路径，一行一本）</label><textarea id="editBooks" rows="4"></textarea>
        <h5>当下状态</h5>
        <label>在听</label><input type="text" id="editListening">
        <button class="btn btn-primary" onclick="saveContent()">保存网站内容</button>
        <span class="status-msg" id="contentMsg"></span>
      </div>
    </div>

    <!-- Tab: Interests -->
    <div class="admin-panel" id="tab-interests">
      <p style="color:#999;font-size:0.88rem;margin-bottom:1.5rem;">编辑每个兴趣板块</p>
      <div id="interestEditors"></div>
      <button class="btn btn-primary" onclick="saveInterests()">保存兴趣内容</button>
      <span class="status-msg" id="interestMsg"></span>
    </div>

    <!-- Tab: Blog -->
    <div class="admin-panel" id="tab-blog">
      <div id="blogEditorList"></div>
      <button class="btn btn-outline" onclick="addBlogPost()" style="margin-top:1rem;">+ 新建文章</button>
      <button class="btn btn-primary" onclick="saveBlog()" style="margin-left:0.5rem;">保存博客更改</button>
      <span class="status-msg" id="blogMsg"></span>
    </div>

    <!-- Tab: Images -->
    <div class="admin-panel" id="tab-images">
      <label>上传图片</label>
      <div class="upload-zone" onclick="document.getElementById('imageUpload').click()">点击选择图片<input type="file" id="imageUpload" accept="image/*" style="display:none;" onchange="uploadImage(this)"></div>
      <p style="font-size:0.8rem;color:#ccc;margin-top:0.3rem;">图片保存到 images/ 文件夹</p>
      <div class="image-grid" id="imageGrid"></div>
      <button class="btn btn-primary" onclick="commitImages()" style="margin-top:1rem;">提交图片更改</button>
      <span class="status-msg" id="imageMsg"></span>
    </div>

  </div>
</div>

<script>
// ============ STATE ============
var REPO = '';
var TOKEN = '';
var siteData = null;
var blogData = null;
var pendingImages = [];
var photoAlbumsData = {};

// ============ INIT ============
var saved = sessionStorage.getItem('latte_admin');
if (saved) {
  try { var cfg = JSON.parse(saved); REPO = cfg.repo; TOKEN = cfg.token; } catch(e) {}
}
if (REPO && TOKEN) { showAdmin(); } else { document.getElementById('setupScreen').style.display = 'block'; }

function connectRepo() {
  REPO = document.getElementById('repoInput').value.trim();
  TOKEN = document.getElementById('tokenInput').value.trim();
  if (!REPO || !TOKEN) { alert('请填写完整'); return; }
  sessionStorage.setItem('latte_admin', JSON.stringify({repo:REPO, token:TOKEN}));
  showAdmin();
}

function disconnect() {
  sessionStorage.removeItem('latte_admin');
  REPO = ''; TOKEN = ''; siteData = null; blogData = null; pendingImages = [];
  photoAlbumsData = {};
  document.getElementById('setupScreen').style.display = 'block';
  document.getElementById('adminMain').classList.remove('ready');
}

async function showAdmin() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('adminMain').classList.add('ready');
  await loadAll();
}

// ============ GITHUB API ============
function utf8ToBase64(str) {
  // Proper UTF-8 to base64
  var bytes = new TextEncoder().encode(str);
  var binary = '';
  for (var i = 0; i < bytes.length; i++) { binary += String.fromCharCode(bytes[i]); }
  return btoa(binary);
}

async function ghAPI(method, path, content) {
  var url = 'https://api.github.com/repos/' + REPO + '/contents/' + path;
  var hdrs = { 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/vnd.github.v3+json' };
  var body = null;
  if (method === 'PUT' && content !== undefined) {
    var sha = null;
    try {
      var getRes = await fetch(url, { headers: hdrs });
      if (getRes.ok) { var j = await getRes.json(); sha = j.sha; }
    } catch(e) {}
    body = JSON.stringify({
      message: 'Update ' + path,
      content: utf8ToBase64(content),
      sha: sha
    });
  }
  var res = await fetch(url, { method: method, headers: hdrs, body: body });
  return res;
}

async function ghRead(path) {
  var res = await ghAPI('GET', path);
  if (!res.ok) return null;
  var j = await res.json();
  var decoded = atob(j.content.replace(/\s/g, ''));
  // Convert from binary to UTF-8
  var bytes = new Uint8Array(decoded.length);
  for (var i = 0; i < decoded.length; i++) { bytes[i] = decoded.charCodeAt(i); }
  return new TextDecoder().decode(bytes);
}

async function loadAll() {
  // Load site.json
  var siteRaw = await ghRead('data/site.json');
  if (siteRaw) {
    siteData = JSON.parse(siteRaw);
    populateSiteForm();
    renderInterestEditors();
  }
  // Load blog.json
  var blogRaw = await ghRead('data/blog.json');
  blogData = blogRaw ? JSON.parse(blogRaw) : { posts: [] };
  renderBlogEditors();
  // Load images
  loadImageList();
}

// ============ TABS ============
function switchTab(tab) {
  var tabs = ['content','interests','blog','images'];
  var btns = document.querySelectorAll('.admin-tabs button');
  for (var i = 0; i < btns.length; i++) {
    if (i < tabs.length) btns[i].classList.toggle('active', i === tabs.indexOf(tab));
  }
  var panels = document.querySelectorAll('.admin-panel');
  for (var j = 0; j < panels.length; j++) { panels[j].classList.remove('active'); }
  document.getElementById('tab-' + tab).classList.add('active');
}

// ============ SITE CONTENT ============
function populateSiteForm() {
  if (!siteData) return;
  document.getElementById('editName').value = siteData.name || '';
  document.getElementById('editTagline').value = siteData.tagline || '';
  document.getElementById('editAbout').value = siteData.about || '';
  document.getElementById('editEmail').value = (siteData.contact || {}).email || '';
  document.getElementById('editBooks').value = (siteData.books || []).map(function(b) {
    return b.title.replace(/《|》/g,'') + ' / ' + b.author + ' / ' + b.cover;
  }).join('\n');
  if (siteData.currently) {
    document.getElementById('editListening').value = siteData.currently.listening || '';
  }
}

async function saveContent() {
  siteData.name = document.getElementById('editName').value;
  siteData.tagline = document.getElementById('editTagline').value;
  siteData.about = document.getElementById('editAbout').value;
  siteData.contact = { email: document.getElementById('editEmail').value };
  siteData.currently = {
    listening: document.getElementById('editListening').value,
  };
  var booksRaw = document.getElementById('editBooks').value.split('\n').filter(Boolean);
  siteData.books = booksRaw.map(function(line) {
    var parts = line.split('/').map(function(s) { return s.trim(); });
    return { title: '《' + (parts[0]||'') + '》', author: parts[1] || '', cover: parts[2] || '' };
  });
  var res = await ghAPI('PUT', 'data/site.json', JSON.stringify(siteData, null, 2));
  var msg = document.getElementById('contentMsg');
  if (res.ok) { msg.textContent = '✓ 已保存'; msg.className = 'status-msg ok'; }
  else { var err = await res.json(); msg.textContent = '✗ 保存失败: ' + (err.message || res.status); msg.className = 'status-msg err'; }
}

// ============ HELPERS ============
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function parseBookLines(text) {
  return text.split('\n').filter(Boolean).map(function(line) {
    var parts = line.split('/').map(function(s) { return s.trim(); });
    return { title: '《' + (parts[0]||'') + '》', author: parts[1] || '', cover: parts[2] || '', review: parts[3] || '' };
  });
}

function booksToText(books) {
  return (books||[]).map(function(b) {
    return b.title.replace(/《|》/g,'') + ' / ' + b.author + ' / ' + (b.cover||'') + ' / ' + (b.review||'');
  }).join('\n');
}

// ============ INTEREST EDITORS ============
function renderPhotoAlbumEditors(idx, albums) {
  var container = document.getElementById('photoAlbumEditor' + idx);
  if (!container) return;
  photoAlbumsData[idx] = albums || [];
  var html = '';
  for (var ai = 0; ai < photoAlbumsData[idx].length; ai++) {
    var a = photoAlbumsData[idx][ai];
    html += '<div class="section-card">';
    html += '<h4>图集 #' + (ai+1) + ': ' + esc(a.name || '未命名') + '</h4>';
    html += '<label>图集名称</label>';
    html += '<input data-pa-idx="' + idx + '" data-pa-ai="' + ai + '" data-pa-field="name" value="' + esc(a.name || '') + '">';
    html += '<label>描述</label>';
    html += '<input data-pa-idx="' + idx + '" data-pa-ai="' + ai + '" data-pa-field="description" value="' + esc(a.description || '') + '">';
    html += '<label>封面图路径</label>';
    html += '<input data-pa-idx="' + idx + '" data-pa-ai="' + ai + '" data-pa-field="cover" value="' + esc(a.cover || '') + '">';
    html += '<label>照片（一行一个路径）</label>';
    html += '<textarea data-pa-idx="' + idx + '" data-pa-ai="' + ai + '" data-pa-field="imagesText" rows="3">' + esc((a.images || []).join('\n')) + '</textarea>';
    html += '<label>随笔 (HTML)</label>';
    html += '<textarea data-pa-idx="' + idx + '" data-pa-ai="' + ai + '" data-pa-field="journal" rows="4">' + esc(a.journal || '') + '</textarea>';
    html += '<button class="delete-btn" onclick="deletePhotoAlbum(' + idx + ',' + ai + ')" style="margin-top:0.5rem;">删除此图集</button>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function addPhotoAlbum(idx) {
  if (!photoAlbumsData[idx]) photoAlbumsData[idx] = [];
  photoAlbumsData[idx].push({ name: '新图集', description: '', cover: '', images: [], journal: '' });
  renderPhotoAlbumEditors(idx, photoAlbumsData[idx]);
}

function deletePhotoAlbum(idx, ai) {
  if (!confirm('确定删除此图集？')) return;
  photoAlbumsData[idx].splice(ai, 1);
  renderPhotoAlbumEditors(idx, photoAlbumsData[idx]);
}

function renderInterestEditors() {
  var container = document.getElementById('interestEditors');
  if (!siteData || !siteData.interests) { container.innerHTML = ''; return; }

  var html = '';
  for (var idx = 0; idx < siteData.interests.length; idx++) {
    var interest = siteData.interests[idx];
    var fields = '<label>描述</label>';
    fields += '<input data-int-idx="' + idx + '" data-field="description" value="' + esc(interest.description || '') + '">';

    if (interest.icon === 'camera') {
      fields += '<div id="photoAlbumEditor' + idx + '"></div>';
      fields += '<button class="btn btn-outline" onclick="addPhotoAlbum(' + idx + ')" style="margin-top:0.5rem;">+ 新建图集</button>';
    } else if (interest.icon === 'book') {
      fields += '<h5>📗 已读（书名 / 作者 / 封面路径 / 感想）</h5>';
      fields += '<textarea data-int-idx="' + idx + '" data-field="readText" rows="5">' + esc(booksToText(interest.read)) + '</textarea>';
      fields += '<p class="help-text">感想会在"我的感想"悬停时显示</p>';
      fields += '<h5>📖 在读</h5>';
      fields += '<textarea data-int-idx="' + idx + '" data-field="readingText" rows="3">' + esc(booksToText(interest.reading)) + '</textarea>';
      fields += '<h5>📚 想读</h5>';
      fields += '<textarea data-int-idx="' + idx + '" data-field="wantToReadText" rows="3">' + esc(booksToText(interest.wantToRead)) + '</textarea>';
    } else if (interest.icon === 'mountain') {
      fields += '<h5>🏔️ 已登山脉（名称 / 日期 / 感想，一行一山）</h5>';
      fields += '<textarea data-int-idx="' + idx + '" data-field="climbedText" rows="4">' + esc((interest.climbed || []).map(function(m) { return (m.name||'') + ' / ' + (m.date||'') + ' / ' + (m.note||''); }).join('\n')) + '</textarea>';
      fields += '<h5>🗻 想登山脉（名称 / 理由）</h5>';
      fields += '<textarea data-int-idx="' + idx + '" data-field="wantToClimbText" rows="3">' + esc((interest.wantToClimb || []).map(function(m) { return (m.name||'') + ' / ' + (m.reason||''); }).join('\n')) + '</textarea>';
      fields += '<h5>✍️ 随笔 (HTML)</h5>';
      fields += '<textarea data-int-idx="' + idx + '" data-field="journal" rows="5">' + esc(interest.journal || '') + '</textarea>';
      fields += '<label>图片路径（一行一个）</label>';
      fields += '<textarea data-int-idx="' + idx + '" data-field="imagesText" rows="3">' + esc((interest.images || []).join('\n')) + '</textarea>';
    } else if (interest.icon === 'sparkle') {
      fields += '<label>爱好列表（一行一个）</label>';
      fields += '<textarea data-int-idx="' + idx + '" data-field="hobbiesText" rows="4">' + esc((interest.hobbies || []).join('\n')) + '</textarea>';
    } else {
      fields += '<label>图片路径（一行一个）</label>';
      fields += '<textarea data-int-idx="' + idx + '" data-field="imagesText" rows="4">' + esc((interest.images || []).join('\n')) + '</textarea>';
    }

    html += '<div class="section-card"><h4>' + interest.name + '</h4>' + fields + '</div>';
  }
  container.innerHTML = html;

  // Render photo album editors after DOM is set
  for (var idx2 = 0; idx2 < siteData.interests.length; idx2++) {
    if (siteData.interests[idx2].icon === 'camera') {
      renderPhotoAlbumEditors(idx2, siteData.interests[idx2].albums || []);
    }
  }
}

// ============ SAVE INTERESTS ============
async function saveInterests() {
  // Collect interest fields
  var intEls = document.querySelectorAll('[data-int-idx]');
  for (var i = 0; i < intEls.length; i++) {
    var el = intEls[i];
    var idx = parseInt(el.getAttribute('data-int-idx'));
    var field = el.getAttribute('data-field');
    if (!siteData.interests[idx]) continue;
    var val = el.value;

    if (field === 'readText') { siteData.interests[idx].read = parseBookLines(val); }
    else if (field === 'readingText') { siteData.interests[idx].reading = parseBookLines(val); }
    else if (field === 'wantToReadText') { siteData.interests[idx].wantToRead = parseBookLines(val); }
    else if (field === 'climbedText') {
      siteData.interests[idx].climbed = val.split('\n').filter(Boolean).map(function(line) {
        var p = line.split('/').map(function(s) { return s.trim(); });
        return { name: p[0] || '', date: p[1] || '', note: p[2] || '' };
      });
    }
    else if (field === 'wantToClimbText') {
      siteData.interests[idx].wantToClimb = val.split('\n').filter(Boolean).map(function(line) {
        var p = line.split('/').map(function(s) { return s.trim(); });
        return { name: p[0] || '', reason: p[1] || '' };
      });
    }
    else if (field === 'hobbiesText') {
      siteData.interests[idx].hobbies = val.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
    }
    else if (field === 'imagesText') {
      siteData.interests[idx].images = val.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
    }
    else if (field === 'journal') { siteData.interests[idx].journal = val; }
    else if (field === 'description') { siteData.interests[idx].description = val; }
  }

  // Collect photo album fields
  var paEls = document.querySelectorAll('[data-pa-idx]');
  for (var j = 0; j < paEls.length; j++) {
    var pel = paEls[j];
    var pidx = parseInt(pel.getAttribute('data-pa-idx'));
    var pai = parseInt(pel.getAttribute('data-pa-ai'));
    var pfield = pel.getAttribute('data-pa-field');
    if (!photoAlbumsData[pidx] || !photoAlbumsData[pidx][pai]) continue;
    var pval = pel.value;

    if (pfield === 'imagesText') {
      photoAlbumsData[pidx][pai].images = pval.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
    } else {
      photoAlbumsData[pidx][pai][pfield] = pval;
    }
  }

  // Sync photo albums back to siteData
  for (var k = 0; k < siteData.interests.length; k++) {
    if (siteData.interests[k].icon === 'camera' && photoAlbumsData[k]) {
      siteData.interests[k].albums = photoAlbumsData[k];
    }
  }

  // Sync books interest to homepage books
  var bookInt = null;
  for (var m = 0; m < siteData.interests.length; m++) {
    if (siteData.interests[m].icon === 'book') { bookInt = siteData.interests[m]; break; }
  }
  if (bookInt) {
    var allBooks = (bookInt.read || []).concat(bookInt.reading || [], bookInt.wantToRead || []);
    siteData.books = allBooks.slice(0, 6).map(function(b) {
      return { title: b.title, author: b.author, cover: (b.cover || '').replace(/^\.\.\//, '') };
    });
  }

  var res = await ghAPI('PUT', 'data/site.json', JSON.stringify(siteData, null, 2));
  var msg = document.getElementById('interestMsg');
  if (res.ok) { msg.textContent = '✓ 已保存'; msg.className = 'status-msg ok'; }
  else { var errData = await res.json(); msg.textContent = '✗ 保存失败: ' + (errData.message || res.status); msg.className = 'status-msg err'; }
}

// ============ BLOG ============
function renderBlogEditors() {
  var container = document.getElementById('blogEditorList');
  if (!blogData || !blogData.posts) { container.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < blogData.posts.length; i++) {
    var p = blogData.posts[i];
    html += '<div class="blog-editor">';
    html += '<h4>文章 #' + (i+1) + '</h4>';
    html += '<label>标题</label><input data-blog-idx="' + i + '" data-field="title" value="' + esc(p.title) + '">';
    html += '<label>日期</label><input data-blog-idx="' + i + '" data-field="date" value="' + (p.date||'') + '">';
    html += '<label>摘要</label><input data-blog-idx="' + i + '" data-field="summary" value="' + esc(p.summary||'') + '">';
    html += '<label>文件名</label><input data-blog-idx="' + i + '" data-field="file" value="' + esc(p.file||'') + '">';
    html += '<label>文章内容 (HTML)</label><textarea data-blog-idx="' + i + '" data-field="content" rows="6">' + esc(p.content||'') + '</textarea>';
    html += '<button class="delete-btn" onclick="deleteBlogPost(' + i + ')" style="margin-top:0.5rem;">删除此文</button>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function addBlogPost() {
  if (!blogData) blogData = { posts: [] };
  blogData.posts.push({
    id: 'post-' + Date.now(),
    title: '新文章',
    date: new Date().toISOString().slice(0,10),
    summary: '',
    file: 'post-' + Date.now() + '.html',
    content: '<p>写点什么...</p>'
  });
  renderBlogEditors();
}

function deleteBlogPost(idx) {
  if (!confirm('确定删除？')) return;
  blogData.posts.splice(idx, 1);
  renderBlogEditors();
}

async function saveBlog() {
  var blogEls = document.querySelectorAll('[data-blog-idx]');
  for (var i = 0; i < blogEls.length; i++) {
    var el = blogEls[i];
    var idx = parseInt(el.getAttribute('data-blog-idx'));
    var field = el.getAttribute('data-field');
    if (blogData.posts[idx]) blogData.posts[idx][field] = el.value;
  }

  // Save blog.json
  var blogMeta = { posts: [] };
  for (var j = 0; j < blogData.posts.length; j++) {
    var p = blogData.posts[j];
    blogMeta.posts.push({ id: p.id, title: p.title, date: p.date, summary: p.summary, file: p.file });
  }
  var res1 = await ghAPI('PUT', 'data/blog.json', JSON.stringify(blogMeta, null, 2));

  // Save each post HTML
  var allOk = true;
  for (var k = 0; k < blogData.posts.length; k++) {
    var bp = blogData.posts[k];
    var postHTML = '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>' + bp.title + ' - Latte</title>\n<link rel="stylesheet" href="../../css/style.css">\n</head>\n<body>\n<nav class="site-nav"><div class="nav-inner"><a class="nav-brand" href="../../index.html">Latte</a><ul class="nav-links"><li><a href="../../index.html">首页</a></li><li><a href="../index.html">博客</a></li></ul></div></nav>\n<section class="blog-post" style="padding:7rem 0 4rem;"><div class="container"><h1>' + bp.title + '</h1><div class="meta">' + bp.date + '</div><div class="content">' + (bp.content||'') + '</div></div></section>\n<footer><div class="container"><span>&copy; 2026 Latte</span></div></footer>\n</body>\n</html>';
    var res2 = await ghAPI('PUT', 'blog/posts/' + bp.file, postHTML);
    if (!res2.ok) allOk = false;
  }

  var msg = document.getElementById('blogMsg');
  if (res1.ok && allOk) { msg.textContent = '✓ 已保存'; msg.className = 'status-msg ok'; }
  else { msg.textContent = '✗ 部分保存失败'; msg.className = 'status-msg err'; }
}

// ============ IMAGES ============
async function loadImageList() {
  try {
    var res = await fetch('https://api.github.com/repos/' + REPO + '/contents/images', {
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    });
    if (!res.ok) { document.getElementById('imageGrid').innerHTML = '<p style="color:#ccc;">暂无图片</p>'; return; }
    var files = await res.json();
    var html = '';
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      if (f.type === 'file' && /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(f.name)) {
        html += '<img src="' + f.download_url + '" alt="' + f.name + '" title="' + f.name + '">';
      }
    }
    document.getElementById('imageGrid').innerHTML = html || '<p style="color:#ccc;">暂无图片</p>';
  } catch(e) { document.getElementById('imageGrid').innerHTML = '<p style="color:#ccc;">加载失败</p>'; }
}

function uploadImage(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    pendingImages.push({ name: file.name, data: e.target.result.split(',')[1] });
    var img = document.createElement('img');
    img.src = e.target.result;
    img.title = file.name + ' (待提交)';
    img.style.opacity = '0.6';
    document.getElementById('imageGrid').appendChild(img);
    document.getElementById('imageMsg').textContent = pendingImages.length + ' 张待提交';
    document.getElementById('imageMsg').style.color = '#ff9800';
  };
  reader.readAsDataURL(file);
}

async function commitImages() {
  if (pendingImages.length === 0) { alert('没有待上传的图片'); return; }
  var ok = 0;
  for (var i = 0; i < pendingImages.length; i++) {
    var img = pendingImages[i];
    var res = await ghAPI('PUT', 'images/' + img.name, img.data);
    if (res.ok) ok++;
  }
  var msg = document.getElementById('imageMsg');
  msg.textContent = ok + '/' + pendingImages.length + ' 上传成功';
  msg.style.color = ok === pendingImages.length ? '#4caf50' : '#c62828';
  document.getElementById('imageMsg').className = ok === pendingImages.length ? 'status-msg ok' : 'status-msg err';
  pendingImages = [];
  loadImageList();
}
</script>
