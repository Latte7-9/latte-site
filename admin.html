<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Latte 管理后台</title><link rel="stylesheet" href="css/admin.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"></head><body><div class="admin-container" id="appRoot"><div class="login-panel" id="loginPanel"><h1>☕ Latte 管理后台</h1><p class="subtitle">通过 GitHub API 管理网站内容</p><div class="form-group"><label>仓库</label><input type="text" id="repoInput" placeholder="Owner/Repo（如 Latte7-9/latte-site）"></div><div class="form-group"><label>GitHub Token</label><input type="password" id="tokenInput" placeholder="ghp_..."></div><button class="btn btn-primary btn-block" id="loginBtn">连接</button><div id="loginMsg" style="margin-top:1rem;text-align:center;font-size:0.78rem"></div></div><div id="mainPanel" style="display:none"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem"><h1 style="font-size:1.3rem;font-weight:600">☕ Latte 管理后台</h1><span class="status-badge status-info" id="connStatus">已连接</span></div><div class="tab-bar" id="tabBar"><button class="tab-btn active" data-tab="site">🏠 站点</button><button class="tab-btn" data-tab="blog">📝 博客</button><button class="tab-btn" data-tab="guestbook">🦆 留言板</button><button class="tab-btn" data-tab="photo">📷 摄影</button><button class="tab-btn" data-tab="books">📖 书籍</button><button class="tab-btn" data-tab="hiking">⛰️ 登山</button><button class="tab-btn" data-tab="hobbies">✨ 爱好</button><button class="tab-btn" data-tab="images">🖼️ 图片</button><button class="tab-btn" data-tab="music">🎵 音乐</button></div><div class="tab-content active" id="tab-site"><div class="content-card"><h2>🏠 站点信息</h2><div class="form-group"><label>网站名称</label><input type="text" id="siteName"></div><div class="form-group"><label>标语</label><input type="text" id="siteTagline"></div><div class="form-group"><label>关于（支持 &lt;br&gt; 换行）</label><textarea id="siteAbout" rows="3"></textarea></div><div class="form-group"><label>邮箱</label><input type="text" id="siteEmail"></div><div class="action-bar"><span class="status-badge status-info" id="siteMsg" style="margin-right:auto"></span><button class="btn btn-primary" onclick="Admin.saveSite()">保存</button></div></div></div><div class="tab-content" id="tab-blog"><div class="content-card"><h2>📝 博客文章</h2><div id="blogList"></div><button class="btn btn-ghost btn-block" onclick="Admin.newBlogPost()" style="margin-top:0.8rem">+ 新建文章</button><div id="blogMsg" style="margin-top:0.5rem;font-size:0.75rem"></div></div></div><div class="tab-content" id="tab-guestbook"><div class="content-card"><h2>🦆 留言池</h2><div id="gbList"></div><div class="action-bar"><button class="btn btn-ghost" onclick="Admin.syncLocalGuestbook()">📥 同步本地留言</button><button class="btn btn-primary" onclick="Admin.saveGuestbook()">保存更改</button></div><div id="gbMsg" style="margin-top:0.5rem;font-size:0.75rem"></div></div></div><div class="tab-content" id="tab-photo"><div class="content-card"><h2>📷 摄影图集</h2><div id="photoList"></div><button class="btn btn-ghost btn-block" onclick="Admin.newAlbum()" style="margin-top:0.8rem">+ 新建图集</button><div class="action-bar"><span class="status-badge status-info" id="photoMsg" style="margin-right:auto"></span><button class="btn btn-primary" onclick="Admin.savePhoto()">保存</button></div></div></div><div class="tab-content" id="tab-books"><div class="content-card"><h2>📖 书籍管理</h2><div id="booksList"></div><div class="action-bar"><span class="status-badge status-info" id="booksMsg" style="margin-right:auto"></span><button class="btn btn-primary" onclick="Admin.saveBooks()">保存</button></div></div></div><div class="tab-content" id="tab-hiking"><div class="content-card"><h2>⛰️ 登山</h2><div id="hikingList"></div><div class="action-bar"><span class="status-badge status-info" id="hikingMsg" style="margin-right:auto"></span><button class="btn btn-primary" onclick="Admin.saveHiking()">保存</button></div></div></div><div class="tab-content" id="tab-hobbies"><div class="content-card"><h2>✨ 三分钟热度</h2><div id="hobbiesList"></div><button class="btn btn-ghost btn-block" onclick="Admin.newHobby()" style="margin-top:0.8rem">+ 添加爱好</button><div class="action-bar"><span class="status-badge status-info" id="hobbiesMsg" style="margin-right:auto"></span><button class="btn btn-primary" onclick="Admin.saveHobbies()">保存</button></div></div></div><div class="tab-content" id="tab-images"><div class="content-card"><h2>🖼️ 图片管理</h2><div class="form-group"><label>上传新图片</label><div style="display:flex;gap:0.5rem"><input type="file" id="imgFileInput" accept="image/*" style="display:none"><button class="btn btn-primary" onclick="document.getElementById('imgFileInput').click()">选择图片</button><span id="imgFileName" style="font-size:0.8rem;color:var(--ink-muted);align-self:center"></span></div></div><div id="imgMsg" style="font-size:0.75rem;margin-top:0.5rem"></div><div style="margin-top:1rem"><h3 style="font-size:0.85rem;color:var(--ink-secondary);margin-bottom:0.5rem">已上传图片</h3><div id="imgGrid" class="img-grid"></div></div></div></div><div class="tab-content" id="tab-music"><div class="content-card"><h2>🎵 网易云音乐同步</h2><p style="font-size:0.82rem;color:var(--ink-secondary);margin-bottom:1rem">手动触发服务器刷新听歌缓存（缓存有效期 30 分钟）</p><div id="musicStatus" style="font-size:0.82rem;margin-bottom:1rem"></div><button class="btn btn-primary" id="musicSyncBtn" onclick="Admin.syncMusic()">🔄 立即同步</button><div id="musicMsg" style="margin-top:0.8rem;font-size:0.75rem"></div></div></div></div><div id="richToolbar" class="rich-toolbar" style="display:none;position:fixed;z-index:100"><button data-tag="b"><strong>B</strong></button><button data-tag="i"><em>I</em></button><button data-tag="h3">H3</button><button data-tag="blockquote">"</button><button data-tag="a">🔗</button><button data-tag="br">↩</button><button data-tag="mark"><mark>M</mark></button></div></div><script src="js/admin.js"></script></body></html>
