<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Latte 管理后台</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f8f7f5;margin:0;padding:1rem 1rem 4rem;color:#333;line-height:1.6}
.wrap{max-width:700px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:1.8rem;margin-bottom:1rem;border:1px solid #eee}
h2{font-weight:400;font-size:1.2rem;margin:0 0 0.3rem;color:#1a1a1a}
h3{font-weight:400;font-size:0.95rem;margin:1.3rem 0 0.5rem;color:#555;border-top:1px solid #f0f0f0;padding-top:1rem}
.sub{font-size:0.8rem;color:#aaa;margin-bottom:1rem}
label{display:block;font-size:0.78rem;color:#999;margin:0.7rem 0 0.15rem}
input,textarea{width:100%;padding:0.55rem 0.7rem;border:1px solid #e0e0e0;border-radius:8px;font-size:0.88rem;font-family:inherit}
textarea{resize:vertical;min-height:60px}
button{cursor:pointer;font-family:inherit}
.btn{display:inline-block;padding:0.55rem 1.2rem;background:#333;color:#fff;border:none;border-radius:8px;font-size:0.85rem;margin-top:0.5rem}
.btn:hover{background:#555}
.btnsm{padding:0.3rem 0.8rem;font-size:0.75rem;background:#888}
.btnsm:hover{background:#666}
.btndel{background:transparent;border:1px solid #f0d0d0;color:#b71c1c;padding:0.25rem 0.6rem;border-radius:6px;font-size:0.75rem}
.btndel:hover{background:#fef0f0}
.status{padding:0.6rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:0.85rem}
.sinfo{background:#e3f0fd;color:#1565c0}
.sok{background:#e8f5e9;color:#2e7d32}
.serr{background:#ffebee;color:#c62828}
.row{display:flex;gap:0.5rem;flex-wrap:wrap}
.row>div{flex:1;min-width:140px}
.tabs{display:flex;gap:0;margin-bottom:0.8rem;border-bottom:1px solid #eee;overflow-x:auto}
.tab{padding:0.4rem 0.8rem;cursor:pointer;border:none;background:transparent;font-size:0.82rem;color:#999;font-family:inherit;white-space:nowrap}
.tab.on{color:#1a1a1a;border-bottom:2px solid #333;margin-bottom:-1px}
.tc{display:none}
.tc.on{display:block}
.msg{font-size:0.8rem;margin-top:0.4rem}
.msgok{color:#2e7d32}
.msgerr{color:#c62828}
.acard,.bpost{background:#fafaf8;border:1px solid #eee;border-radius:8px;padding:1rem;margin-bottom:0.8rem}
.hint{font-size:0.72rem;color:#bbb;margin-top:0.2rem}
.toolbar{display:none;position:fixed;z-index:1000;background:#2a2a2a;border-radius:10px;padding:0.3rem 0.5rem;gap:0.2rem;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.toolbar.on{display:flex}
.toolbar button{background:transparent;border:none;color:#ccc;padding:0.3rem 0.5rem;border-radius:4px;cursor:pointer;font-size:0.8rem}
.toolbar button:hover{background:#444;color:#fff}
.toolbar .sep{width:1px;background:#444;margin:0 0.2rem;height:18px}
</style>
</head>
<body>
<div class="toolbar" id="rtb">
<button data-tag="b"><b>粗</b></button>
<button data-tag="i"><i>斜</i></button>
<span class="sep"></span>
<button data-tag="br">换行</button>
<button data-tag="p">段落</button>
<span class="sep"></span>
<button data-tag="h3">标题</button>
<button data-tag="blockquote">引用</button>
<span class="sep"></span>
<button data-tag="mark">高亮</button>
<button data-tag="a">链接</button>
</div>

<div style="text-align:right;max-width:700px;margin:0 auto 0.5rem;">
<a href="https://latte7-9.github.io/latte-site/" target="_blank" style="display:inline-block;padding:0.4rem 1rem;background:#2471a3;color:#fff;border-radius:100px;text-decoration:none;font-size:0.82rem;font-weight:500;">➜ 打开我的网站</a>
</div>
<div class="wrap">
<div id="status" class="status sinfo">连接到 GitHub</div>

<div class="card" id="loginBox">
<h2>连接</h2>
<label>仓库</label><input id="repo" value="Latte7-9/latte-site">
<label>令牌</label><input id="token" type="password" placeholder="ghp_...">
<button class="btn" onclick="login()">连接</button>
</div>

<div id="panel" style="display:none">

<div class="tabs" id="tabs">
<button class="tab on" data-tab="site">网站</button>
<button class="tab" data-tab="photo">摄影</button>
<button class="tab" data-tab="books">书籍</button>
<button class="tab" data-tab="hobbies">兴趣</button>
<button class="tab" data-tab="hiking">登山</button>
<button class="tab" data-tab="blog">博客</button>
<button class="tab" data-tab="guestbook">留言池</button>
<button class="tab" data-tab="images">图片</button>
<button class="tab" data-tab="netease">🎵 随心一听</button>
</div>

<div class="tc on" id="tab-site"><div class="card">
<h2>网站内容</h2>
<label>姓名</label><input id="sName">
<label>标语</label><input id="sTagline">
<label>关于</label><textarea id="sAbout" rows="2" data-rich></textarea>
<label>邮箱</label><input id="sEmail">
<hr><div class="sub">当下</div>
<div class="row"><div><label>在读</label><input id="sReading"></div><div><label>在听</label><input id="sListening"></div></div>
<div class="row"><div><label>在学</label><input id="sLearning"></div><div><label>在做</label><input id="sWorkingOn"></div></div>
<hr>
<label>首页书籍（书名 | 作者 | 封面）</label>
<textarea id="sBooks" rows="3"></textarea>
<span class="hint">先在图片标签页上传封面</span>
<button class="btn" onclick="saveSite()">保存</button>
<div class="msg" id="msgSite"></div>
</div></div>

<div class="tc" id="tab-photo"><div class="card">
<h2>摄影图集</h2>
<div id="photoList"></div>
<button class="btn btnsm" onclick="addAlbum()">+ 新建图集</button>
<button class="btn" onclick="savePhoto()" style="margin-left:0.5rem">保存</button>
<div class="msg" id="msgPhoto"></div>
</div></div>

<div class="tc" id="tab-books"><div class="card">
<h2>书籍</h2>
<div class="sub">格式：书名 | 作者 | 感想（每行一本）</div>
<h3>已读</h3><textarea id="bRead" rows="3"></textarea>
<h3>正在阅读</h3><textarea id="bReading" rows="2"></textarea>
<h3>想要阅读</h3><textarea id="bWantRead" rows="2"></textarea>
<button class="btn" onclick="saveBooks()">保存</button>
<div class="msg" id="msgBooks"></div>
</div></div>

<div class="tc" id="tab-hobbies"><div class="card">
<h2>兴趣爱好</h2>
<div class="sub">每行一个</div>
<textarea id="hList" rows="6"></textarea>
<button class="btn" onclick="saveHobbies()">保存</button>
<div class="msg" id="msgHobbies"></div>
</div></div>

<div class="tc" id="tab-hiking"><div class="card">
<h2>登山</h2>
<div class="sub">已登：名称 | 日期 | 备注</div>
<textarea id="hkClimbed" rows="3"></textarea>
<h3>想要征服</h3><div class="sub">名称 | 理由</div>
<textarea id="hkWant" rows="2"></textarea>
<h3>随笔</h3><textarea id="hkJournal" rows="3" data-rich></textarea>
<h3>图片（每行一个路径）</h3><textarea id="hkImages" rows="2"></textarea>
<button class="btn" onclick="saveHiking()">保存</button>
<div class="msg" id="msgHiking"></div>
</div></div>

<div class="tc" id="tab-blog"><div class="card">
<h2>博客</h2>
<div class="sub">创建和编辑博客文章。保存时自动生成 HTML 页面。</div>
<div id="blogList"></div>
<button class="btn btnsm" onclick="addBlog()">+ 新建</button>
<button class="btn" onclick="saveBlog()" style="margin-left:0.5rem">保存全部</button>
<div class="msg" id="msgBlog"></div>
</div></div>

<div class="tc" id="tab-guestbook"><div class="card">
<h2>留言池</h2>
<div class="sub">查看和删除访客留言</div>
<div id="gbList"></div>
<button class="btndel" onclick="loadGuestbook()" style="margin-bottom:0.5rem">刷新</button>
<button class="btn" onclick="saveGuestbook()">保存更改</button>
<button class="btndel" onclick="syncLocalGuestbook()" style="margin-left:0.5rem">同步本地留言</button>
<div class="msg" id="msgGuestbook"></div>
</div></div>


<div class="tc" id="tab-netease"><div class="card">
<h2>🎵 随心一听</h2>
<div class="sub">数据来源：拿铁超人獭 · 网易云近一周听歌排行</div>
<div id="neStatus" class="status sinfo">检查中...</div>
<div style="margin-bottom:0.8rem;">
<button class="btn btnsm" onclick="neSync()">手动同步</button>
</div>
<div class="msg" id="neMsg"></div>
</div></div>

<div class="tc" id="tab-images"><div class="card">
<h2>图片上传</h2>
<input type="file" id="imgFile" accept="image/*" style="margin-bottom:0.5rem">
<button class="btn btnsm" onclick="uploadImg()">上传</button>
<div class="msg" id="msgImg"></div>
<h3>已上传</h3><div id="imgList"></div>
</div></div>

</div>
</div>


<script>
var NE_API = (location.hostname==='localhost'||location.hostname==='127.0.0.1')?'':'https://latte-site-production.up.railway.app';

(async function(){
  var el=document.getElementById('neStatus');
  try{
    var r=await fetch(NE_API+'/api/netease/status');
    var d=await r.json();
    if(d.ok){
      el.className='status sok';
      el.innerHTML='✓ 在线 | 缓存 '+d.songCount+' 首歌'+(d.cachedAt?' | 上次同步: '+new Date(d.cachedAt).toLocaleString():"");
    }else{
      el.className='status serr';el.innerHTML='✗ 离线';
    }
  }catch(e){el.className='status serr';el.innerHTML='网络异常';}
})();

async function neSync(){
  var m=document.getElementById('neMsg');
  m.textContent='同步中...';m.className='msg';
  try{
    var r=await fetch(NE_API+'/api/netease/sync',{method:'POST'});
    var d=await r.json();
    if(d.ok){m.textContent='✓ 已同步 '+d.songCount+' 首歌';m.className='msg msgok';location.reload();}
    else{m.textContent='✗ 同步失败';m.className='msg msgerr';}
  }catch(e){m.textContent='✗ 请求失败';m.className='msg msgerr';}
}
</script>
<script src="admin.js"></script>
</body>
</html>
