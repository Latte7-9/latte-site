  <section class="about section-container fade-up">

  <div class="vinyl-player" id="vinylPlayer" style="display:none">

<script>
window.config = {
  SIM_RESOLUTION: 128, DYE_RESOLUTION: 1024, CAPTURE_RESOLUTION: 512,
  DENSITY_DISSIPATION: 1, VELOCITY_DISSIPATION: 0.2, PRESSURE: 0.8,
  PRESSURE_ITERATIONS: 20, CURL: 30, SPLAT_RADIUS: 0.25, SPLAT_FORCE: 6000,
  SHADING: true, COLORFUL: true, COLOR_UPDATE_SPEED: 10, PAUSED: false,
  BACK_COLOR: { r: 10, g: 10, b: 10 }, TRANSPARENT: false,
  BLOOM: true, BLOOM_ITERATIONS: 8, BLOOM_RESOLUTION: 256,
  BLOOM_INTENSITY: 0.3, BLOOM_THRESHOLD: 0.8, BLOOM_SOFT_KNEE: 0.7,
  SUNRAYS: true, SUNRAYS_RESOLUTION: 196, SUNRAYS_WEIGHT: 0.8,
};
</script>
<script>
var hiddenProperty = (function() {
  var prefixes = ['webkit', 'moz', 'ms', 'o'];
  if ('hidden' in document) return 'hidden';
  for (var i = 0; i < prefixes.length; i++) {
    if ((prefixes[i] + 'Hidden') in document) return prefixes[i] + 'Hidden';
  }
  return null;
})();
window.visibilityChangeEvent = (hiddenProperty || 'hidden').replace(/[Hh]idden/, 'visibilitychange');
window.hiddenProperty = hiddenProperty;
window.switchPage = { switched: false };
</script>
