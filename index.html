<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latte</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script></head>
<body>

<!-- ====== 入场层 ====== -->
<div id="intro-layer">
  <canvas id="background"></canvas>
  <div class="content-inner intro-wrap">
    <h2 class="intro-title" id="introTitle">Latte</h2>
    <h3 class="intro-subtitle" id="introSubtitle"></h3>
    <a class="intro-enter">进入</a>
    <div class="intro-arrow intro-arrow-1"></div>
    <div class="intro-arrow intro-arrow-2"></div>
  </div>
  <div class="shape-wrap">
    <svg class="shape" width="100%" height="100vh" preserveAspectRatio="none" viewBox="0 0 1440 800">
      <path d="M -44,-50 C -52.71,28.52 15.86,8.186 184,14.69 383.3,22.39 462.5,12.58 638,14 835.5,15.6 987,6.4 1194,13.86 1661,30.68 1652,-36.74 1582,-140.1 1512,-243.5 15.88,-589.5 -44,-50 Z"
            data-original="M -44,-50 C -137.1,117.4 67.86,445.5 236,452 435.3,459.7 500.5,242.6 676,244 873.5,245.6 957,522.4 1154,594 1593,753.7 1793,226.3 1582,-126 1371,-478.3 219.8,-524.2 -44,-50 Z">
      </path>
    </svg>
  </div>
</div>

<!-- ====== 主内容层 ====== -->
<div id="main-content"><canvas class="grid-background" id="gridCanvas"></canvas>


<nav class="site-nav">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">Latte</a>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="blog/">博客</a></li>
    </ul>
  </div>
</nav>

<section class="hero">
  <div class="container fade-in"></div>
</section>

<section class="about">
  <div class="container fade-in"></div>
</section>

<section class="random-listen">
  <div class="container fade-in"></div>
</section>

<section class="blog-preview">
  <div class="container fade-in">
    <div class="section-label">博客</div>
    <div class="blog-list" id="homeBlogList"></div>
    <a class="view-all" href="blog/">查看全部 &rarr;</a>
  </div>
</section>

<section class="interests">
  <div class="container fade-in">
    <div class="section-label">兴趣</div>
    <div class="interest-grid"></div>
  </div>
</section>

<section class="books">
  <div class="container fade-in">
    <div class="section-label">最近在读</div>
    <div class="book-list"></div>
  </div>
</section>

<section class="guestbook">
  <div class="container fade-in">
    <div class="section-label">留言池</div>
    <div class="guestbook-list" id="guestbookList"></div>
    <form class="guestbook-form" id="guestbookForm">
      <input type="text" id="gbName" placeholder="你的名字（选填）" maxlength="30">
      <textarea id="gbText" placeholder="说点什么吧..." rows="3" required maxlength="500"></textarea>
      <button type="submit">留言</button>
    </form>
    <div class="guestbook-msg" id="gbMsg"></div>
  </div>
</section>

<section class="contact">
  <div class="container fade-in">
    <div class="section-label">联系</div>
    <div class="contact-links"></div>
  </div>
</section>

<div class="geo-strip">
  <svg viewBox="0 0 1200 80" preserveAspectRatio="none">
    <polygon points="0,80 180,35 180,80" fill="rgba(41,144,192,0.08)"/>
    <polygon points="180,35 350,60 350,80 180,80" fill="rgba(41,144,192,0.05)"/>
    <polygon points="350,60 520,20 520,80 350,80" fill="rgba(41,144,192,0.08)"/>
    <polygon points="520,20 690,50 690,80 520,80" fill="rgba(41,144,192,0.05)"/>
    <polygon points="690,50 860,25 860,80 690,80" fill="rgba(41,144,192,0.08)"/>
    <polygon points="860,25 1030,55 1030,80 860,80" fill="rgba(41,144,192,0.05)"/>
    <polygon points="1030,55 1200,30 1200,80 1030,80" fill="rgba(41,144,192,0.08)"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#2a3038" stroke-width="1"/>
  </svg>
</div>


<!-- ====== 唱片悬浮播放器 ====== -->
<div class="vinyl-player" id="vinylPlayer">
  <div class="vinyl-record" id="vinylRecord">
    <div class="vinyl-groove"></div>
    <div class="vinyl-label"></div>
  </div>
  <div class="vinyl-body" id="vinylBody">
    <div class="vinyl-info">
      <div class="vinyl-title" id="vinylTitle">加载中...</div>
      <div class="vinyl-artist" id="vinylArtist"></div>
    </div>
    <div class="vinyl-iframe-wrap" id="vinylIframe"></div>
    <button class="vinyl-close" id="vinylClose">×</button>
  </div>
</div>

<footer>
  <div class="container"><span>&copy; 2026 Latte</span></div>
</footer>

<button class="back-to-top" id="backToTop" aria-label="返回顶部"><svg viewBox="0 0 16 16" fill="none"><path d="M3 10l5-5 5 5" stroke="#999" stroke-width="1.5" stroke-linecap="round"/></svg></button>



</div><!-- /#main-content -->

<script>window.onerror=function(m,s,l,c,e){var d=document.createElement("div");d.style.cssText="position:fixed;top:0;left:0;right:0;background:red;color:#fff;padding:10px;z-index:99999;font-size:14px;white-space:pre-wrap";d.textContent="JS ERROR: "+m+" at "+s+":"+l+":"+c;document.body.prepend(d);};console.log=function(){var a=document.createElement("div");a.style.cssText="background:#ff0;color:#000;padding:4px;font-size:12px";a.textContent=Array.from(arguments).join(" ");var p=document.getElementById("diag-log");if(p)p.appendChild(a);};</script>
<script>
window.config = {
  SIM_RESOLUTION: 128,
  DYE_RESOLUTION: 1024,
  CAPTURE_RESOLUTION: 512,
  DENSITY_DISSIPATION: 1,
  VELOCITY_DISSIPATION: 0.2,
  PRESSURE: 0.8,
  PRESSURE_ITERATIONS: 20,
  CURL: 30,
  SPLAT_RADIUS: 0.25,
  SPLAT_FORCE: 6000,
  SHADING: true,
  COLORFUL: true,
  COLOR_UPDATE_SPEED: 10,
  PAUSED: false,
  BACK_COLOR: { r: 26, g: 30, b: 36 },
  TRANSPARENT: false,
  BLOOM: true,
  BLOOM_ITERATIONS: 8,
  BLOOM_RESOLUTION: 256,
  BLOOM_INTENSITY: 0.3,
  BLOOM_THRESHOLD: 0.8,
  BLOOM_SOFT_KNEE: 0.7,
  SUNRAYS: true,
  SUNRAYS_RESOLUTION: 196,
  SUNRAYS_WEIGHT: 0.8,
};
</script>
<script>
var hiddenProperty = (function() {
  var prefixes = ['webkit', 'moz', 'ms', 'o'];
  if ('hidden' in document) return 'hidden';
  for (var i = 0; i < prefixes.length; i++) {
    if ((prefixes[i] + 'Hidden') in document) return prefixes[i] + 'Hidden';
  }
  return null;
})();
window.visibilityChangeEvent = (hiddenProperty || 'hidden').replace(/[Hh]idden/, 'visibilitychange');
window.hiddenProperty = hiddenProperty;
window.switchPage = { switched: false };
</script>
<script src="js/particles.js"></script>
<script src="js/background.js"></script>
<script src="js/grid-bg.js"></script><script src="js/main.js"></script>

</body>



</html>
