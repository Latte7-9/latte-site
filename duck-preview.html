<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>鸭子设计预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    font-family: -apple-system, "PingFang SC", sans-serif;
    color: #ccc;
    padding: 2rem;
    min-height: 100vh;
  }
  h1 { color: #00d4aa; margin-bottom: 1rem; font-size: 1.2rem; }
  h2 { margin-top: 2rem; font-size: 0.9rem; color: #888; margin-bottom: 0.5rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 2rem;
    margin-top: 1rem;
  }
  .duck-card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 2rem 1.5rem;
    text-align: center;
    transition: border-color 0.3s;
  }
  .duck-card:hover { border-color: #00d4aa44; }
  .duck-card svg { max-width: 160px; margin: 0 auto 1rem; display: block; }
  .duck-card .label { font-size: 0.75rem; color: #666; margin-top: 0.5rem; }
  .duck-card .colors { font-size: 0.65rem; color: #444; margin-top: 0.3rem; }
  .version-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.65rem;
    margin-bottom: 0.5rem;
  }
  .v-old { background: #331111; color: #ff6666; }
  .v-new { background: #113322; color: #66ff99; }
</style>
</head>
<body>

<h1>🦆 鸭子 SVG 设计对比</h1>
<p style="font-size:0.8rem;color:#555;">点击卡片可复制 SVG 代码</p>

<h2>❌ 旧版（复杂）</h2>
<div class="grid" id="oldGrid"></div>

<h2>✅ 新版候选方案</h2>
<div class="grid" id="newGrid"></div>

<script>
const colors = ['#ffb800','#00d4aa','#ff3d71','#7c4dff','#2990c0','#ff6d3a','#3ad4ff','#ff5e99'];

// ========== 旧版 SVG（供对比） ==========
function oldSVG(c) {
  return '<svg viewBox="0 0 80 68" width="150" height="128" style="display:block;margin:0 auto;">' +
    '<ellipse cx="32" cy="42" rx="23" ry="16" fill="'+c+'" opacity="0.90"/>'+
    '<ellipse cx="34" cy="38" rx="16" ry="10" fill="'+c+'" opacity="0.22"/>'+
    '<ellipse cx="30" cy="48" rx="16" ry="7" fill="'+c+'" opacity="0.40"/>'+
    '<circle cx="50" cy="24" r="12" fill="'+c+'" opacity="0.90"/>'+
    '<circle cx="52" cy="20" r="7" fill="'+c+'" opacity="0.22"/>'+
    '<circle cx="47" cy="26" r="6.5" fill="'+c+'" opacity="0.40"/>'+
    '<path d="M60,22 C64,21 68,22.5 68,24 C68,25.5 64,26 60,25 Z" fill="'+c+'" opacity="0.80"/>'+
    '<circle cx="53" cy="21" r="3.2" fill="#0a0a0a"/>'+
    '<circle cx="53.8" cy="20.4" r="1.2" fill="#fff" opacity="0.85"/>'+
    '<path d="M10,38 C6,36 5,32 8,30 C10,29 12,32 10,36 Z" fill="'+c+'" opacity="0.65"/>'+
    '<path d="M20,36 C26,32 40,32 46,38 C42,42 30,44 22,42 C19,40 19,38 20,36 Z" fill="'+c+'" opacity="0.20"/>'+
  '</svg>';
}

// ========== 新版方案 ==========

// 方案A: 经典圆润橡皮鸭（bean形身体+圆头+三角嘴）
function newA(c) {
  return '<svg viewBox="0 0 80 66" width="150" height="124" style="display:block;margin:0 auto;">' +
    // 身体：圆润 bean 形
    '<path d="M10,42 C10,26 22,16 38,16 C52,16 60,26 60,40 C60,54 50,60 38,60 C24,60 10,54 10,42Z" fill="'+c+'"/>'+
    // 头：圆，与身体无缝衔接
    '<circle cx="52" cy="22" r="13" fill="'+c+'"/>'+
    // 眼睛：大圆+高光
    '<circle cx="56" cy="19" r="3.5" fill="#0a0a0a"/>'+
    '<circle cx="57" cy="18" r="1.3" fill="#fff" opacity="0.8"/>'+
    // 嘴巴：短三角
    '<path d="M63,21 L72,22.5 L63,24.5Z" fill="'+c+'"/>'+
    // 翘尾巴
    '<path d="M10,38 C5,35 5,30 10,28" fill="none" stroke="'+c+'" stroke-width="5" stroke-linecap="round"/>'+
    // 翅膀弧线
    '<path d="M24,36 C30,32 40,32 46,36" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>'+
  '</svg>';
}

// 方案B: 极简可爱风（更小眼睛、更圆身体、微笑嘴）
function newB(c) {
  return '<svg viewBox="0 0 80 66" width="150" height="124" style="display:block;margin:0 auto;">' +
    '<path d="M12,44 C12,30 24,20 40,20 C54,20 62,30 62,42 C62,56 52,62 40,62 C26,62 12,56 12,44Z" fill="'+c+'"/>'+
    '<circle cx="54" cy="24" r="12" fill="'+c+'"/>'+
    // 大眼睛
    '<circle cx="57" cy="21" r="4" fill="#0a0a0a"/>'+
    '<circle cx="58" cy="20" r="1.5" fill="#fff" opacity="0.85"/>'+
    '<circle cx="56" cy="22" r="0.6" fill="#fff" opacity="0.4"/>'+
    // 腮红
    '<circle cx="60" cy="26" r="3" fill="'+c+'" opacity="0.25"/>'+
    // 小嘴巴（微笑弧）
    '<path d="M62,25 C64,26 66,26 67,25" fill="none" stroke="'+c+'" stroke-width="1.5" stroke-linecap="round"/>'+
    // 尾巴
    '<path d="M12,40 C7,37 7,32 12,30" fill="none" stroke="'+c+'" stroke-width="4.5" stroke-linecap="round"/>'+
    // 翅膀
    '<path d="M26,38 C32,34 42,34 48,38" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>'+
  '</svg>';
}

// 方案C: 极简线条风（扁平、干净、无高光）
function newC(c) {
  return '<svg viewBox="0 0 80 66" width="150" height="124" style="display:block;margin:0 auto;">' +
    '<path d="M12,44 C12,30 24,20 40,20 C54,20 62,30 62,42 C62,56 52,62 40,62 C26,62 12,56 12,44Z" fill="'+c+'"/>'+
    '<circle cx="54" cy="24" r="12" fill="'+c+'"/>'+
    '<circle cx="57" cy="21" r="3" fill="#0a0a0a"/>'+
    '<circle cx="57.8" cy="20.2" r="1" fill="#fff"/>'+
    '<path d="M63,23 L70,24 L63,26Z" fill="'+c+'" opacity="0.85"/>'+
    '<path d="M12,40 C7,37 7,32 12,30" fill="none" stroke="'+c+'" stroke-width="4" stroke-linecap="round"/>'+
  '</svg>';
}

// 方案D: 3D 立体风（渐变+阴影+光泽）
function newD(c) {
  return '<svg viewBox="0 0 80 66" width="150" height="124" style="display:block;margin:0 auto;">' +
    '<defs><radialGradient id="b'+c.replace('#','')+'" cx="40%" cy="35%"><stop offset="0%" stop-color="rgba(255,255,255,0.25)"/><stop offset="100%" stop-color="rgba(0,0,0,0.1)"/></radialGradient></defs>' +
    '<path d="M12,44 C12,30 24,20 40,20 C54,20 62,30 62,42 C62,56 52,62 40,62 C26,62 12,56 12,44Z" fill="url(#b'+c.replace('#','')+')"/>'+
    '<path d="M12,44 C12,30 24,20 40,20 C54,20 62,30 62,42 C62,56 52,62 40,62 C26,62 12,56 12,44Z" fill="'+c+'"/>'+
    '<circle cx="54" cy="24" r="12" fill="'+c+'"/>'+
    '<circle cx="57" cy="21" r="4" fill="#0a0a0a"/>'+
    '<circle cx="58" cy="20" r="1.5" fill="#fff" opacity="0.8"/>'+
    '<circle cx="56.5" cy="22" r="0.6" fill="#fff" opacity="0.35"/>'+
    '<path d="M63,22 L71,23.5 L63,26Z" fill="'+c+'" opacity="0.9"/>'+
    '<path d="M12,40 C7,37 7,32 12,30" fill="none" stroke="'+c+'" stroke-width="5" stroke-linecap="round"/>'+
    '<path d="M26,38 C32,34 42,34 48,38" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linecap="round"/>'+
  '</svg>';
}

// 方案E: 超萌Q版（大头、小身体、圆眼、扁嘴）
function newE(c) {
  return '<svg viewBox="0 0 80 66" width="150" height="124" style="display:block;margin:0 auto;">' +
    // 小身体
    '<ellipse cx="34" cy="46" rx="18" ry="14" fill="'+c+'"/>'+
    // 大圆头
    '<circle cx="48" cy="28" r="16" fill="'+c+'"/>'+
    // 大眼睛（圆）
    '<circle cx="53" cy="25" r="4.5" fill="#0a0a0a"/>'+
    '<circle cx="54" cy="24" r="1.8" fill="#fff" opacity="0.85"/>'+
    '<circle cx="52.5" cy="26" r="0.7" fill="#fff" opacity="0.4"/>'+
    // 腮红
    '<circle cx="60" cy="30" r="3.5" fill="'+c+'" opacity="0.2"/>'+
    // 扁嘴
    '<ellipse cx="64" cy="29" rx="4" ry="2" fill="'+c+'" opacity="0.85"/>'+
    // 小尾巴
    '<path d="M16,44 C12,42 12,38 16,36" fill="none" stroke="'+c+'" stroke-width="3.5" stroke-linecap="round"/>'+
    // 小翅膀
    '<path d="M28,42 C32,38 40,38 44,42" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>'+
  '</svg>';
}

// ========== 渲染 ==========
const oldColors = ['#ffb800','#ff3d71','#7c4dff','#00d4aa'];
const oldGrid = document.getElementById('oldGrid');
oldColors.forEach(c => {
  const card = document.createElement('div');
  card.className = 'duck-card';
  card.innerHTML = '<span class="version-tag v-old">旧版</span>' + oldSVG(c) + '<div class="label">标准旧版</div><div class="colors">'+c+'</div>';
  oldGrid.appendChild(card);
});

const newConfigs = [
  { fn: newA, name: 'A: 经典圆润', tag: 'v-new' },
  { fn: newB, name: 'B: 可爱腮红', tag: 'v-new' },
  { fn: newC, name: 'C: 极简线条', tag: 'v-new' },
  { fn: newD, name: 'D: 3D立体', tag: 'v-new' },
  { fn: newE, name: 'E: 超萌Q版', tag: 'v-new' }
];

const newGrid = document.getElementById('newGrid');
newConfigs.forEach(cfg => {
  oldColors.forEach(c => {
    const card = document.createElement('div');
    card.className = 'duck-card';
    card.innerHTML = '<span class="version-tag '+cfg.tag+'">'+cfg.name+'</span>' + cfg.fn(c) + '<div class="label">'+c+'</div>';
    newGrid.appendChild(card);
  });
});

// 点击复制 SVG
document.querySelectorAll('.duck-card').forEach(card => {
  card.style.cursor = 'pointer';
  card.title = '点击复制 SVG 代码';
  card.addEventListener('click', () => {
    const svg = card.querySelector('svg');
    if (svg) {
      navigator.clipboard.writeText(svg.outerHTML).then(() => {
        card.style.borderColor = '#00d4aa';
        setTimeout(() => card.style.borderColor = '', 1000);
      });
    }
  });
});
</script>
</body>
</html>
