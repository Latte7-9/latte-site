<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>鸭子设计预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; font-family: sans-serif; color: #ccc; padding: 2rem; }
  h1 { color: #00d4aa; margin-bottom: 0.5rem; }
  p { color: #666; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2rem; }
  .card { background: #141414; border: 1px solid #222; border-radius: 16px; padding: 2rem; text-align: center; }
  .card:hover { border-color: #00d4aa44; }
  .card svg { max-width: 200px; margin: 0 auto 1rem; display: block; }
  .card .label { font-size: 0.8rem; color: #888; margin-top: 0.5rem; }
  .card .desc { font-size: 0.7rem; color: #555; margin-top: 0.3rem; line-height: 1.5; }
</style>
</head>
<body>

<h1>🦆 橡皮鸭设计</h1>
<p>基于真实橡皮鸭比例：扁嘴（上喙凸起）+ 圆头 + 圆润身体 + 上翘小尾 + 翅膀</p>

<div class="grid" id="grid"></div>

<script>
const COLORS = ['#ffb800','#00d4aa','#ff3d71','#7c4dff'];

// ====== 橡皮鸭正确解剖 ======
// 真实橡皮鸭比例：
//   1. 身体：椭圆形，前低后高，底部平坦（能浮起来）
//   2. 头部：圆球，坐在身体前上方，与身体有过渡
//   3. 喙：从脸部突出，上喙向上翘起（扁而宽），下喙扁平
//   4. 翅膀：身体两侧各一片，弧形上翘
//   5. 尾巴：身体后端一小撮，上翘

function duck(c) {
  // 提取颜色分量
  var r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
  var dark = 'rgb('+Math.max(0,r-50)+','+Math.max(0,g-50)+','+Math.max(0,b-50)+')';
  var light = 'rgba('+r+','+g+','+b+',0.25)';
  var shadow = 'rgba(0,0,0,0.15)';

  return '<svg viewBox="0 0 120 95" width="200" height="158" xmlns="http://www.w3.org/2000/svg">' +
    // === 阴影（地面投影）===
    '<ellipse cx="55" cy="88" rx="35" ry="5" fill="rgba(0,0,0,0.25)"/>'+

    // === 尾巴（小撮，上翘）===
    '<path d="M22,55 Q15,48 18,42 Q22,46 26,50Z" fill="'+c+'"/>'+

    // === 身体（椭圆，底部略平）===
    '<ellipse cx="55" cy="60" rx="32" ry="24" fill="'+c+'"/>'+
    // 身体暗面（底部受光少）
    '<ellipse cx="55" cy="66" rx="28" ry="14" fill="'+shadow+'"/>'+
    // 身体高光（左上）
    '<ellipse cx="45" cy="50" rx="18" ry="10" fill="'+light+'"/>'+

    // === 脖子（连接头和身体，向前延伸）===
    '<path d="M72,52 Q80,42 82,38 L82,38 Q80,44 74,54Z" fill="'+c+'"/>'+
    // 脖子暗面
    '<path d="M72,52 Q78,44 80,40 L80,40 Q78,46 74,54Z" fill="'+shadow+'" opacity="0.3"/>'+

    // === 头部（圆球）===
    '<circle cx="82" cy="32" r="16" fill="'+c+'"/>'+
    // 头顶高光
    '<circle cx="80" cy="24" r="8" fill="'+light+'"/>'+
    // 头部暗面（右下）
    '<circle cx="86" cy="36" r="10" fill="'+shadow+'"/>'+

    // === 上喙（从脸部突出，向上翘）===
    '<path d="M96,30 Q104,26 108,28 Q106,30 96,32Z" fill="'+c+'"/>'+
    // 上喙高光
    '<path d="M98,29 Q104,27 106,28" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>'+

    // === 下喙（扁平）===
    '<path d="M96,32 Q104,31 108,32 Q106,33.5 96,34Z" fill="'+c+'" opacity="0.7"/>'+

    // === 眼睛（黑色圆点，偏上）===
    '<circle cx="89" cy="28" r="3.5" fill="#0a0a0a"/>'+
    // 眼睛高光（两个点）
    '<circle cx="90" cy="27" r="1.3" fill="#fff" opacity="0.9"/>'+
    '<circle cx="88.5" cy="28.5" r="0.5" fill="#fff" opacity="0.4"/>'+

    // === 翅膀（身体左侧，弧形上翘）===
    '<path d="M30,55 Q28,42 40,38 Q44,42 42,52 Q38,56 30,55Z" fill="'+c+'" opacity="0.7"/>'+
    // 翅膀高光
    '<path d="M32,50 Q32,44 40,40" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>'+

    // === 翅膀（身体右侧，部分被头挡住）===
    '<path d="M78,55 Q80,46 88,44 Q90,48 86,54 Q82,56 78,55Z" fill="'+c+'" opacity="0.5"/>'+

  '</svg>';
}

// ====== 渲染 ======
var grid = document.getElementById('grid');
COLORS.forEach(function(c) {
  var card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = duck(c) +
    '<div class="label">🦆 橡皮鸭</div>'+
    '<div class="desc">标准比例：扁嘴上翘<br>圆头+椭圆身体<br>两侧翅膀+小尾</div>';
  grid.appendChild(card);
});
</script>
</body>
</html>
