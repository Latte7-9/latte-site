    <div style="color:var(--text-body);font-size:0.95rem;line-height:2.1;">凌晨三点出发，头顶是银河，脚下是石阶，心中是期待。<br><br>夜爬泰山是我策划已久的一次出行。从红门出发，打着手电，跟着人流，一步一个台阶。<br><br>到达中天门的时候已经是凌晨四点半，山风渐起，温度骤降。但我们没有停——日出的时间不等人。<br><br>最终在五点四十分到达日观峰。天边泛起了鱼肚白，然后是一抹橙色，然后是整片天空被点燃。那一刻，所有的疲惫都值了。<br><br>下山的时候腿在抖，但心是满的。</div>
