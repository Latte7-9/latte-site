    <h1>第一次夜爬泰山</h1>
    <div class="meta">2025-05-20</div>
    <div class="content">
      <p>凌晨两点出发，头灯的光只够照亮脚下三米。</p>
      <p>十八盘比想象中更漫长。走过一半的时候小腿开始发抖，同行的朋友把热水递过来——那种在黑暗中和朋友互相打气的感觉，比山顶的日出还要温暖。</p>
      <p>六点二十分，天边开始泛白。然后是一线金色，然后是整片天空被点燃。站在山顶上，说不清是因为累还是因为美，眼眶有点发热。</p>
      <p>下次还要来。冬天来。</p>
