<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Duck Debug</title></head>
<body style="background:#0a0a0a;color:#0f0;font:14px monospace;padding:20px;">
<h1>Duck Pool Debug</h1>
<pre id="log"></pre>
<script>
var log = document.getElementById('log');
function l(msg) { log.textContent += msg + '\n'; console.log(msg); }

// 1. Check if duck-pool.js loaded
l('Step 1: Loading duck-pool.js...');
var s = document.createElement('script');
s.src = 'js/duck-pool.js';
s.onload = function() { l('Script loaded OK'); };
s.onerror = function() { l('ERROR: Failed to load js/duck-pool.js'); };
document.head.appendChild(s);

setTimeout(function() {
  l('Step 2: Checking globals...');
  l('poolW: ' + (typeof poolW !== 'undefined' ? poolW : 'undefined'));
  l('ducks count: ' + (typeof ducks !== 'undefined' ? ducks.length : 'undefined'));
  l('window.submitDuckMessage: ' + (typeof window.submitDuckMessage));
}, 3000);
</script>
</body>
</html>
